name: Build & Publish image for Caffeine

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (optional multi-platform)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image and tag with SHA + caffeine-latest
        run: |
          IMAGE_SHA=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.sha }}
          IMAGE_LATEST=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:caffeine-latest
          echo "Building images: $IMAGE_SHA and $IMAGE_LATEST"
          docker build -t "$IMAGE_SHA" -t "$IMAGE_LATEST" .
          echo "$IMAGE_SHA" > image_ref.txt
          echo "$IMAGE_LATEST" >> image_ref.txt

      - name: Push images to GHCR
        run: |
          IMAGE_SHA=$(sed -n '1p' image_ref.txt)
          IMAGE_LATEST=$(sed -n '2p' image_ref.txt)
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"
          echo "pushed $IMAGE_SHA and $IMAGE_LATEST"
          echo "IMAGE_SHA=$IMAGE_SHA" >> $GITHUB_OUTPUT
          echo "IMAGE_LATEST=$IMAGE_LATEST" >> $GITHUB_OUTPUT

      - name: Print pushed image refs
        run: cat image_ref.txt
